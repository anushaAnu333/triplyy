# ===============================================================
# TRIPLY - CI/CD Pipeline
# ===============================================================
# Frontend: deployed on Vercel (auto-deploys on push to main)
# Backend:  deployed on Render (auto-deploys on push to main)
# This workflow: build, test, lint, security scan on push/PR
# ===============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  FRONTEND_DIR: 'triply-frontend'
  BACKEND_DIR: 'triply-backend'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Stage 1: Frontend Build & Test
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
        
      - name: Build Next.js application
        run: npm run build
        env:
          CI: true
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:5000/api/v1' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.FRONTEND_DIR }}/.next
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Backend Build & Test
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.BACKEND_DIR }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
        
      - name: Build TypeScript
        run: npm run build
        
      - name: Run tests
        run: npm test -- --coverage --passWithNoTests
        continue-on-error: true
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_TEST_URI || 'mongodb://localhost:27017/triply_test' }}
          
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ${{ env.BACKEND_DIR }}/coverage
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Security Scanning
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    permissions:
      security-events: write
      actions: read
      contents: read
    
    strategy:
      matrix:
        directory:
          - ${{ env.FRONTEND_DIR }}
          - ${{ env.BACKEND_DIR }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.directory }}/package-lock.json
          
      - name: Install dependencies
        working-directory: ${{ matrix.directory }}
        run: npm ci
        
      - name: Run npm audit
        working-directory: ${{ matrix.directory }}
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Stage 4: CodeQL Security Analysis
  # ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
          
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ─────────────────────────────────────────────────────────────
  # Stage 5: Dependency Review (for PRs)
  # ─────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0

  # ─────────────────────────────────────────────────────────────
  # Stage 6: Build Summary
  # ─────────────────────────────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [frontend, backend, security, codeql]
    if: always()
    
    steps:
      - name: Check job status
        run: |
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "CodeQL: ${{ needs.codeql.result }}"
          
          if [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.backend.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          
          echo "✅ All checks passed"
